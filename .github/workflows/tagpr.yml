name: tagpr

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  tagpr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: Songmu/tagpr@v1
        id: tagpr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # タグが作成された場合、Tauri ビルドを自動トリガー
      - name: Trigger Tauri build
        if: steps.tagpr.outputs.tag != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "New tag: ${{ steps.tagpr.outputs.tag }}"
          gh workflow run "Tauri Desktop Build" -f release_tag="${{ steps.tagpr.outputs.tag }}"
