server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # SPA: all /Graphium/* routes fall back to index.html
    location /Graphium/ {
        try_files $uri $uri/ /Graphium/index.html;
    }

    # Redirect root to /Graphium/
    location = / {
        return 301 /Graphium/;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
