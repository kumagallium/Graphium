# Graphium — standalone editor (no AI features)
#
# Usage:
#   docker compose -f docker-compose.standalone.yml up -d
#   http://localhost:5174/Graphium/
#
# This runs Graphium as a standalone note editor with Google Drive sync.
# No AI assistant, no agent server, no database required.
#
# To enable AI + MCP tools (full Crucible stack), use the default docker-compose.yml:
#   docker compose up -d

services:
  provnote:
    build:
      context: .
    ports:
      - "5174:80"
    restart: unless-stopped
